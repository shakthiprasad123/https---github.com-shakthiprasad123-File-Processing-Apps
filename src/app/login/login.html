<div class="login-container">

  <div class="login-card">

    <h1>File Processing System</h1>

    <h3>Login</h3>

    <input
      type="text"
      placeholder="Enter Email"
      [(ngModel)]="userid"
    />

    <input
      type="password"
      placeholder="Enter Password"
      [(ngModel)]="password"
    />

    <div class="error-msg">
      {{ errorMessage }}
    </div>

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
